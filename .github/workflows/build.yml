name: Build and Release

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]

jobs:
  build-native:
    name: Build native library (UBI 9 / OpenSSL 3.x)
    runs-on: ubuntu-latest
    container:
      image: registry.access.redhat.com/ubi9/ubi:latest

    steps:
      - name: Install build dependencies
        run: |
          dnf install -y \
            java-21-openjdk-devel \
            maven \
            openssl-devel \
            apr-devel \
            autoconf \
            automake \
            libtool \
            gcc \
            make \
            git

      - name: Checkout
        uses: actions/checkout@v4

      - name: Show OpenSSL version
        run: openssl version

      - name: Build
        run: mvn clean package -DskipTests

      - name: Verify native library
        run: |
          find . -name "*.so" -exec readelf -d {} \; | grep NEEDED

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: smallrye-openssl-native
          path: native/target/*.jar

  release:
    name: Publish to Maven Central
    needs: build-native
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: smallrye-openssl-native

      # TODO: Configure Maven Central publishing via SmallRye release process
      - name: Publish
        run: echo "TODO - publish to Maven Central"
